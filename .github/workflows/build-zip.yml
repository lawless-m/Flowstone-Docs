name: Build Flowstone-Docs zip

# Rebuild Flowstone-Docs.zip whenever a note (or the build script / this
# workflow itself) changes on main, and publish it as a release artifact
# on the "latest" tag so flowstone-wasm can fetch a stable URL.
on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - 'scripts/build-zip.sh'
      - '.github/workflows/build-zip.yml'

permissions:
  contents: write

jobs:
  build-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Flowstone-Docs.zip
        run: ./scripts/build-zip.sh

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest corpus
          body: Auto-built corpus zip from latest main.
          files: Flowstone-Docs.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
